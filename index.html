<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAVE Round Robins</title>

    <style>
      :root {
        --bg: #0f172a;
        --bg-top: #020617;
        --panel: #111827;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --border: rgba(255, 255, 255, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Arial, sans-serif;
        background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 55%, var(--panel) 100%);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        text-align: center;
        padding: 2rem;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.04);
      }

      h1 {
        margin: 0 0 0.75rem 0;
        font-size: 3rem;
        color: var(--text);
      }

      p {
        margin: 0;
        font-size: 1.1rem;
        color: var(--muted);
      }

      .accent {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>RAVE <span class="accent">Round Robins</span></h1>
      <p>Testing GitHub Pages</p>
    </div>
  </body>
</html>
